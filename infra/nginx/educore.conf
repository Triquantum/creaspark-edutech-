# Wildcard tenant vhost — TLS terminated here (certbot/cert-manager)
server {
  listen 443 ssl http2;
  server_name *.educore.in educore.in;

  location /api/ { proxy_pass http://api:4000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; }
  location /docs { proxy_pass http://api:4000; proxy_set_header Host $host; }
  location /     { proxy_pass http://web:3000; proxy_set_header Host $host; }
}
