apiVersion: apps/v1
kind: Deployment
metadata: { name: educore-api, labels: { app: educore-api } }
spec:
  replicas: 3
  selector: { matchLabels: { app: educore-api } }
  template:
    metadata: { labels: { app: educore-api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/creaspark/educore-api:latest
          ports: [{ containerPort: 4000 }]
          envFrom: [{ secretRef: { name: educore-secrets } }]
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
          livenessProbe:
            httpGet: { path: /api/v1/health/live, port: 4000 }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /api/v1/health/ready, port: 4000 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: educore-api }
spec:
  selector: { app: educore-api }
  ports: [{ port: 4000, targetPort: 4000 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: educore-api }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: educore-api }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
