version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: educore
      POSTGRES_PASSWORD: educore
      POSTGRES_DB: educore
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educore"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      DATABASE_URL: postgresql://educore:educore@postgres:5432/educore?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
    ports: ["4000:4000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: sh -c "npx prisma migrate deploy --schema=node_modules/@educore/database/prisma/schema.prisma && node dist/main.js"

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
