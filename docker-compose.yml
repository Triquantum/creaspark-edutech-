version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL to your Supabase Postgres connection string}
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
    ports: ["4000:4000"]
    depends_on:
      redis: { condition: service_healthy }
    command: sh -c "npx prisma migrate deploy --schema=node_modules/@educore/database/prisma/schema.prisma && node dist/main.js"

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports: ["3000:3000"]
    depends_on: [api]
