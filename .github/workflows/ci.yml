name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: educore, POSTGRES_PASSWORD: educore, POSTGRES_DB: educore }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U educore" --health-interval 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://educore:educore@localhost:5432/educore?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @educore/database generate
      - run: pnpm --filter @educore/database migrate:deploy
      - run: pnpm build
      - run: pnpm test
      - run: pnpm lint

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f apps/api/Dockerfile -t educore-api:latest .
      - run: docker build -f apps/web/Dockerfile -t educore-web:latest .

  e2e:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose up -d --build
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: pnpm --dir e2e install && pnpm --dir e2e exec playwright install --with-deps chromium
      - run: pnpm --filter @educore/database seed
      - run: WEB_URL=http://localhost:3000 pnpm --dir e2e test
